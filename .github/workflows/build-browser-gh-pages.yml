name: Build and deploy target-browser to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build target-browser
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build target-browser
        run: pnpm build:browser

      - name: Upload the pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./packages/target-browser/dist

  deploy:
    name: Publish GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Publish Pages
        id: deployment
        uses: actions/deploy-pages@v4
